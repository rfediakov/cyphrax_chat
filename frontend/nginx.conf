upstream api {
  server api:3001;
}

server {
  listen 80;
  server_name _;

  # Allow audio/video attachment uploads. Backend enforces stricter per-type
  # limits (3 MB images, 10 MB audio/video, 20 MB other) and returns a clean
  # JSON error; nginx's default 1 MB cap was rejecting recordings before they
  # ever reached the API.
  client_max_body_size 25m;

  root /usr/share/nginx/html;
  index index.html;

  location /api {
    proxy_pass http://api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  location /socket.io {
    proxy_pass http://api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
