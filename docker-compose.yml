services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: chat
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:27017:27017"

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/chat
      REDIS_URL: redis://redis:6379
      PORT: 3001
    volumes:
      - uploads:/uploads
    depends_on:
      - mongo
      - redis
    ports:
      - "127.0.0.1:3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

  coturn:
    image: coturn/coturn:latest
    network_mode: host
    environment:
      - TURN_USERNAME=${TURN_USERNAME:-safegroup}
      - TURN_PASSWORD=${TURN_PASSWORD:-safegroup_turn_secret}
    command: >
      -n --log-file=stdout
      --min-port=49152 --max-port=49200
      --use-auth-secret
      --static-auth-secret=${TURN_PASSWORD:-safegroup_turn_secret}
      --realm=safegroup.local
      --no-multicast-peers
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "49152-49200:49152-49200/udp"

volumes:
  mongo_data:
  uploads:
