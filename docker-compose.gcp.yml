# GCP VM overlay — use: docker compose -f docker-compose.yml -f docker-compose.gcp.yml up -d --build
services:
  api:
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/chat
      REDIS_URL: redis://redis:6379
      PORT: 3001

  # coturn uses host networking and many UDP ports — skip on first deploy (tight e2-micro RAM)
  coturn:
    profiles:
      - turn
